{% extends "base.html" %}

{% block content %}
<article>
    <header>
        <h2>{{ jogador.nome }}</h2>
        <p>
            <strong>Delegação:</strong> {{ jogador.delegacao.nome }} <br>
            <strong>Posição:</strong> {{ jogador.posicao }}
        </p>
    </header>

    <div class="grid">
        <div class="stat">
            <h3>{{ stats.gols }}</h3>
            <p>Gols Marcados</p>
        </div>
        <div class="stat">
            <h3>{{ stats.mvps }}</h3>
            <p>Vezes "Melhor da Partida"</p>
        </div>
    </div>
</article>

<style>
    .stat {
        text-align: center;
        padding: 1rem;
        border: 1px solid var(--muted-border-color);
        border-radius: var(--border-radius);
    }
    .stat h3 {
        margin-bottom: 0;
    }
</style>
{% endblock %}
